<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dormmate Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
/* ── Color Tokens ─────────────────────────────────────────── */
:root {
  --navy:        #0D3B4F;
  --navy-mid:    #0a2f40;
  --navy-dark:   #071f2b;
  --navy-light:  #134a62;
  --teal:        #0A7E8C;
  --teal-light:  #14A8BA;
  --teal-faint:  rgba(20,168,186,.12);
  --teal-border: rgba(20,168,186,.28);
  --gold:        #F5A623;
  --gold-dark:   #c2841a;
  --gold-faint:  rgba(245,166,35,.13);
  --gold-border: rgba(245,166,35,.32);
  --offwhite:    #F4F9FA;
  --surface:     #ffffff;
  --surface2:    #edf5f7;
  --surface3:    #daeef2;
  --text-primary:   #0D3B4F;
  --text-secondary: #4a7a8a;
  --text-muted:     #7aacba;
  --border:      rgba(10,126,140,.18);
  --border-soft: rgba(10,126,140,.1);

  /* status */
  --ok-bg:    #d0f0e8; --ok-text:   #0a4a38;
  --warn-bg:  #fef3cd; --warn-text: #7a4a00;
  --danger-bg:#fde0de; --danger-text:#7a1a12;
}

*{box-sizing:border-box;margin:0;padding:0}

body {
  font-family:'DM Sans',sans-serif;
  background:var(--offwhite);
  color:var(--text-primary);
}

.app {
  max-width:680px;
  margin:0 auto;
  min-height:100vh;
  background:var(--offwhite);
}

/* ── Login ─────────────────────────────────────────────────── */
.login-screen {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2.5rem 1.5rem;
  background:linear-gradient(160deg, var(--navy-dark) 0%, var(--navy) 45%, #0a5a6e 100%);
  position:relative;
  overflow:hidden;
}

/* geometric accent shapes */
.login-screen::before {
  content:'';
  position:absolute;
  top:-80px; right:-80px;
  width:320px; height:320px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(20,168,186,.18) 0%, transparent 70%);
  pointer-events:none;
}
.login-screen::after {
  content:'';
  position:absolute;
  bottom:-60px; left:-60px;
  width:260px; height:260px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(245,166,35,.12) 0%, transparent 70%);
  pointer-events:none;
}

.brand {
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:6px;
  z-index:1;
}
.brand-icon {
  width:44px; height:44px;
  border-radius:14px;
  background:linear-gradient(135deg, var(--teal), var(--teal-light));
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 16px rgba(20,168,186,.4);
}
.brand-icon svg { width:22px; height:22px; }
.brand-name {
  font-size:24px; font-weight:600;
  color:#fff;
  letter-spacing:-.4px;
}

.login-sub {
  font-size:13px;
  color:rgba(255,255,255,.5);
  margin-bottom:2.2rem;
  z-index:1;
  letter-spacing:.2px;
}

.user-cards {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  width:100%; max-width:480px;
  margin-bottom:1.5rem;
  z-index:1;
}

.ucard {
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;
  padding:1.3rem 1rem;
  cursor:pointer;
  transition:all .2s;
  text-align:center;
  backdrop-filter:blur(6px);
}
.ucard:hover {
  background:rgba(20,168,186,.14);
  border-color:var(--teal-border);
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(10,126,140,.25);
}
.ucard.active {
  background:rgba(20,168,186,.22);
  border-color:var(--teal-light);
  transform:translateY(-3px);
  box-shadow:0 8px 28px rgba(10,126,140,.35);
}

.ucard .avatar {
  width:50px; height:50px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:15px;
  margin:0 auto 10px;
  border:2px solid rgba(255,255,255,.2);
}
.ucard .uname { font-size:13px; font-weight:600; color:#fff; }
.ucard .urole { font-size:11px; color:rgba(255,255,255,.45); margin-top:3px; }

.login-btn {
  width:100%; max-width:480px;
  padding:13px;
  border:none; border-radius:12px;
  background:linear-gradient(135deg, var(--teal), var(--teal-light));
  color:#fff;
  font-size:14px; font-weight:600;
  cursor:pointer;
  letter-spacing:.2px;
  transition:all .18s;
  box-shadow:0 4px 16px rgba(10,126,140,.4);
  z-index:1;
}
.login-btn:hover {
  transform:translateY(-1px);
  box-shadow:0 6px 22px rgba(10,126,140,.5);
}

.login-err {
  font-size:12px;
  color:#F09595;
  margin-top:10px;
  display:none;
  z-index:1;
}

/* ── Topbar ─────────────────────────────────────────────────── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 20px;
  background:linear-gradient(90deg, var(--navy-dark), var(--navy));
  border-bottom:1px solid rgba(20,168,186,.2);
  position:sticky; top:0; z-index:10;
}
.tb-left { display:flex; align-items:center; gap:10px; }
.tb-logo {
  font-size:16px; font-weight:700;
  color:#fff; letter-spacing:-.3px;
}
.tb-logo span { color:var(--teal-light); }
.tb-right { display:flex; align-items:center; gap:10px; }
.tb-user { font-size:13px; color:rgba(255,255,255,.6); }
.tb-logout {
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.14);
  border-radius:8px;
  padding:5px 13px;
  font-size:12px; font-weight:500;
  color:rgba(255,255,255,.8);
  cursor:pointer;
  transition:all .15s;
}
.tb-logout:hover {
  background:rgba(20,168,186,.2);
  border-color:var(--teal-border);
  color:#fff;
}

/* ── Main ───────────────────────────────────────────────────── */
.main {
  padding:18px 20px;
  background:var(--offwhite);
  min-height:calc(100vh - 56px);
}

/* ── Toast ─────────────────────────────────────────────────── */
.toast {
  padding:10px 16px;
  border-radius:10px;
  font-size:13px; font-weight:500;
  margin-bottom:14px;
  transition:opacity .4s;
  border-left:3px solid transparent;
}
.toast.ok     { background:var(--ok-bg);     color:var(--ok-text);     border-left-color:#0a9e6e; }
.toast.warn   { background:var(--warn-bg);   color:var(--warn-text);   border-left-color:var(--gold); }
.toast.danger { background:var(--danger-bg); color:var(--danger-text); border-left-color:#c0392b; }

/* ── Nav tabs ───────────────────────────────────────────────── */
.nav-tabs {
  display:flex; gap:2px;
  margin-bottom:18px;
  background:var(--surface3);
  border-radius:12px;
  padding:4px;
  border:1px solid var(--border-soft);
}
.tab {
  font-size:13px; font-weight:500;
  padding:7px 16px;
  cursor:pointer;
  color:var(--text-secondary);
  border-radius:9px;
  transition:all .18s;
  flex:1; text-align:center;
}
.tab:hover { color:var(--text-primary); background:rgba(255,255,255,.6); }
.tab.on {
  background:var(--surface);
  color:var(--navy);
  font-weight:600;
  border:0.5px solid var(--border);
  box-shadow:0 1px 4px rgba(10,126,140,.1);
}

/* ── Metric cards ───────────────────────────────────────────── */
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.grid4 { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }

.metric {
  border-radius:13px;
  padding:15px;
  border:1px solid var(--border-soft);
  background:var(--surface);
  position:relative;
  overflow:hidden;
}
.metric::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:3px;
  background:linear-gradient(90deg, var(--teal), var(--teal-light));
}
.metric-label {
  font-size:10px; font-weight:600;
  color:var(--text-muted);
  margin-bottom:6px;
  text-transform:uppercase; letter-spacing:.7px;
}
.metric-val {
  font-size:26px; font-weight:700;
  color:var(--navy);
  line-height:1;
  font-family:'DM Mono',monospace;
}
.metric-sub { font-size:11px; color:var(--text-secondary); margin-top:4px; }

/* ── Cards ──────────────────────────────────────────────────── */
.card {
  background:var(--surface);
  border:1px solid var(--border-soft);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
  overflow:hidden;
  box-shadow:0 1px 6px rgba(10,62,79,.06);
}
.card-head {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px;
  padding-bottom:10px;
  border-bottom:1px solid var(--border-soft);
}
.card-title { font-size:14px; font-weight:600; color:var(--navy); }
.card-sub   { font-size:12px; color:var(--text-secondary); margin-top:2px; }

/* ── Rows ───────────────────────────────────────────────────── */
.row {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid var(--border-soft);
}
.row:last-child { border-bottom:none; padding-bottom:0; }
.row-label { font-size:13px; font-weight:500; color:var(--navy); }
.row-sub   { font-size:11px; color:var(--text-secondary); margin-top:2px; }
.row-done .row-label { text-decoration:line-through; color:var(--text-muted); }

/* ── Badges ─────────────────────────────────────────────────── */
.tag {
  font-size:11px; font-weight:600;
  padding:3px 10px;
  border-radius:20px;
  white-space:nowrap;
}

/* remapped to new palette */
.tag-teal   { background:rgba(10,126,140,.12);  color:var(--teal); border:1px solid rgba(10,126,140,.25); }
.tag-purple { background:rgba(13,59,79,.1);      color:var(--navy); border:1px solid rgba(13,59,79,.2); }
.tag-coral  { background:rgba(245,166,35,.14);   color:var(--gold-dark); border:1px solid var(--gold-border); }
.tag-gray   { background:var(--surface2);        color:var(--text-secondary); border:1px solid var(--border-soft); }
.tag-green  { background:var(--ok-bg);           color:var(--ok-text); }
.tag-amber  { background:var(--warn-bg);         color:var(--warn-text); }
.tag-red    { background:var(--danger-bg);       color:var(--danger-text); }

/* role pills in topbar */
.role-pill { font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; letter-spacing:.3px; }

/* ── Buttons ────────────────────────────────────────────────── */
.btn {
  border-radius:9px;
  padding:7px 15px;
  font-size:12px; font-weight:600;
  cursor:pointer; border:none;
  transition:all .15s;
  letter-spacing:.1px;
  font-family:'DM Sans',sans-serif;
}
.btn-sm { padding:4px 11px; font-size:11px; border-radius:7px; }

.btn-teal   { background:var(--teal);   color:#fff; }
.btn-teal:hover { background:var(--teal-light); box-shadow:0 2px 10px rgba(10,126,140,.35); }

.btn-purple { background:var(--navy);   color:#fff; }
.btn-purple:hover { background:var(--navy-light); box-shadow:0 2px 10px rgba(13,59,79,.3); }

.btn-coral  { background:var(--gold-dark); color:#fff; }
.btn-coral:hover { background:var(--gold); }

.btn-ghost {
  background:var(--surface2);
  color:var(--text-secondary);
  border:1px solid var(--border);
}
.btn-ghost:hover { background:var(--surface3); color:var(--navy); }

.btn-red    { background:#c0392b; color:#fff; }
.btn-red:hover { background:#a93226; }

/* ── Progress bar ───────────────────────────────────────────── */
.prog-wrap {
  height:5px;
  background:var(--surface2);
  border-radius:3px;
  overflow:hidden;
  margin-top:6px;
  border:1px solid var(--border-soft);
}
.prog-fill { height:100%; border-radius:3px; transition:width .5s cubic-bezier(.4,0,.2,1); }

/* ── Avatar ─────────────────────────────────────────────────── */
.av {
  width:36px; height:36px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700;
  flex-shrink:0;
}

/* ── Input row ──────────────────────────────────────────────── */
.input-row { display:flex; gap:8px; margin-top:12px; }
.input-row input,
.input-row select {
  flex:1;
  font-size:13px;
  padding:9px 12px;
  border-radius:9px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--navy);
  font-family:'DM Sans',sans-serif;
  min-width:0;
  transition:border-color .15s, box-shadow .15s;
}
.input-row input::placeholder { color:var(--text-muted); }
.input-row input:focus,
.input-row select:focus {
  outline:none;
  border-color:var(--teal);
  box-shadow:0 0 0 3px rgba(10,126,140,.12);
  background:var(--surface);
}

/* ── Section header ─────────────────────────────────────────── */
.sec-hd { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.sec-hd-line { flex:1; height:1px; background:var(--border-soft); }
.sec-hd-txt {
  font-size:10px; font-weight:700;
  color:var(--text-muted);
  text-transform:uppercase; letter-spacing:.9px;
  white-space:nowrap;
}

/* ── Bills collection table ─────────────────────────────────── */
.bcol-table { width:100%; border-collapse:collapse; }
.bcol-table th {
  font-size:10px; font-weight:700; letter-spacing:.7px;
  text-transform:uppercase; color:var(--text-muted);
  padding:8px 10px; text-align:left;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.bcol-table th:last-child,.bcol-table td:last-child { text-align:center; }
.bcol-table td {
  font-size:13px; padding:10px 10px;
  border-bottom:1px solid var(--border-soft);
  color:var(--navy);
  vertical-align:middle;
}
.bcol-table tr:last-child td { border-bottom:none; }
.bcol-table tr:hover td { background:var(--surface2); }
.bcol-amount { font-family:'DM Mono',monospace; font-weight:600; font-size:13px; }
.bcol-toggle {
  width:38px; height:22px; border-radius:11px;
  border:none; cursor:pointer;
  transition:all .2s; position:relative;
  display:inline-flex; align-items:center; padding:2px 3px;
  flex-shrink:0;
}
.bcol-toggle.paid   { background:var(--teal); justify-content:flex-end; }
.bcol-toggle.unpaid { background:var(--border); justify-content:flex-start; }
.bcol-toggle span {
  width:18px; height:18px; border-radius:50%;
  background:#fff; display:block;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
  pointer-events:none;
}
.summary-strip {
  display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;
}
.summary-chip {
  flex:1; min-width:120px;
  background:var(--surface);
  border:1px solid var(--border-soft);
  border-radius:12px; padding:12px 14px;
  position:relative; overflow:hidden;
}
.summary-chip::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:3px;
}
.summary-chip.collected::before { background:var(--teal); }
.summary-chip.uncollected::before { background:var(--gold); }
.summary-chip.total-chip::before { background:var(--navy); }
.summary-chip .sc-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--text-muted); margin-bottom:5px; }
.summary-chip .sc-val { font-size:22px; font-weight:700; font-family:'DM Mono',monospace; line-height:1; }
.summary-chip.collected .sc-val   { color:var(--teal); }
.summary-chip.uncollected .sc-val { color:var(--gold-dark); }
.summary-chip.total-chip .sc-val  { color:var(--navy); }
.summary-chip .sc-sub { font-size:11px; color:var(--text-secondary); margin-top:3px; }
.bill-section-head {
  display:flex; align-items:center; justify-content:space-between;
  margin:16px 0 8px;
}
.bill-section-head .bsh-label {
  font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.8px;
  color:var(--text-muted);
}
.bill-section-head .bsh-count {
  font-size:11px; font-weight:600;
  padding:2px 9px; border-radius:20px;
}

.check-box {
  width:18px; height:18px;
  border-radius:5px;
  border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  transition:all .15s;
}
.check-box.checked {
  background:var(--teal);
  border-color:var(--teal);
}
</style>
</head>
<body>
<div class="app" id="app">

<div class="login-screen" id="login">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div class="brand-name">Dormmate Manager</div>
  </div>
  <div class="login-sub">Select your account to continue</div>
  <div class="user-cards">
    <div class="ucard" onclick="selectUser(0)" id="uc0">
      <div class="avatar" style="background:#0A7E8C;color:#d0f4f8">AL</div>
      <div class="uname">Angel Lita</div>
      <div class="urole">Room leader</div>
    </div>
    <div class="ucard" onclick="selectUser(1)" id="uc1">
      <div class="avatar" style="background:#0a3d55;color:#14A8BA">RL</div>
      <div class="uname">Reign Llabres</div>
      <div class="urole">Regular roommate</div>
    </div>
    <div class="ucard" onclick="selectUser(2)" id="uc2">
      <div class="avatar" style="background:#7a4a00;color:#ffd980">FG</div>
      <div class="uname">Francis Garcia</div>
      <div class="urole">Landlord</div>
    </div>
  </div>
  <button class="login-btn" onclick="login()">Sign in</button>
  <div class="login-err" id="login-err">Please select a user first</div>
</div>

<div id="dashboard" style="display:none"></div>
</div>

<script>
const STATE={
  user:null,
  chores:[
    {id:1,task:'Clean the kitchen',assigned:'Reign Llabres',due:'Mon',done:false},
    {id:2,task:'Take out the trash',assigned:'',due:'Wed',done:true},
    {id:3,task:'Vacuum the hallway',assigned:'',due:'Fri',done:false},
    {id:4,task:'Clean the bathroom',assigned:'',due:'Sun',done:false},
    {id:5,task:'Mop the floor',assigned:'',due:'Sat',done:true},
  ],
  bills:[
    {id:1,label:'Electricity',total:800,shares:{Reign:400,Angel:400},paid:{Reign:false,Angel:true}},
    {id:2,label:'Water',total:400,shares:{Reign:200,Angel:200},paid:{Reign:true,Angel:false}},
    {id:3,label:'WiFi',total:600,shares:{Reign:300,Angel:300},paid:{Reign:true,Angel:true}},
  ],
  rules:[
    {id:1,text:'Quiet hours: 10pm – 7am',author:'Francis Garcia',level:'dorm'},
    {id:2,text:'No smoking inside any room',author:'Francis Garcia',level:'dorm'},
    {id:3,text:'Complete chores within 24 hours',author:'Angel Lita',level:'room'},
    {id:4,text:'Label your food in the shared fridge',author:'Angel Lita',level:'room'},
  ],
  roommates:[
    {name:'Angel Lita',role:'leader',room:'101'},
    {name:'Reign Llabres',role:'roommate',room:'101'},
  ],
  activeTab:'chores',
};

const USERS=[
  {name:'Angel Lita',role:'leader',initials:'AL',room:'101'},
  {name:'Reign Llabres',role:'roommate',initials:'RL',room:'101'},
  {name:'Francis Garcia',role:'landlord',initials:'FG',room:'all'},
];

let selectedUser=null;

function selectUser(i){
  selectedUser=i;
  document.querySelectorAll('.ucard').forEach((c,j)=>c.classList.toggle('active',i===j));
}

function login(){
  if(selectedUser===null){
    const e=document.getElementById('login-err');e.style.display='block';
    setTimeout(()=>e.style.display='none',2000);return;
  }
  STATE.user=USERS[selectedUser];
  STATE.activeTab=STATE.user.role==='landlord'?'overview':'chores';
  document.getElementById('login').style.display='none';
  document.getElementById('dashboard').style.display='block';
  render();
}

function logout(){
  selectedUser=null;STATE.user=null;
  document.getElementById('login').style.display='flex';
  document.getElementById('dashboard').style.display='none';
  document.querySelectorAll('.ucard').forEach(c=>c.classList.remove('active'));
}

function setTab(t){STATE.activeTab=t;render();}

function toast(msg,type='ok'){
  const el=document.getElementById('_toast');if(!el)return;
  el.textContent=msg;el.className='toast '+type;el.style.opacity='1';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',2600);
}

function markChore(id){
  const c=STATE.chores.find(x=>x.id===id);if(!c)return;
  const u=STATE.user;
  if(u.role==='roommate'&&c.assigned!==u.name){toast('Not your chore!','warn');return;}
  c.done=!c.done;toast(c.done?'Chore marked done!':'Marked as pending','ok');render();
}

function payBill(bid){
  const b=STATE.bills.find(x=>x.id===bid);
  const sn=STATE.user.name.split(' ')[0];
  if(!b||!b.paid.hasOwnProperty(sn))return;
  b.paid[sn]=!b.paid[sn];
  toast(b.paid[sn]?'Payment confirmed!':'Payment undone',b.paid[sn]?'ok':'warn');render();
}

function addChore(){
  const inp=document.getElementById('nc'),sel=document.getElementById('na');
  if(!inp||!inp.value.trim())return;
  STATE.chores.push({id:Date.now(),task:inp.value.trim(),assigned:sel.value,due:'TBD',done:false});
  inp.value='';toast('Chore assigned!');render();
}

function addRule(){
  const inp=document.getElementById('nr');if(!inp||!inp.value.trim())return;
  const sel=document.getElementById('rl');
  const level=STATE.user.role==='landlord'?'dorm': (sel?sel.value:'room');
  STATE.rules.push({id:Date.now(),text:inp.value.trim(),author:STATE.user.name,level});
  inp.value='';toast('Rule posted!');render();
}

function deleteRule(id){
  STATE.rules=STATE.rules.filter(r=>r.id!==id);toast('Rule removed','danger');render();
}

function removeRoommate(name){
  STATE.roommates=STATE.roommates.filter(r=>r.name!==name);
  toast(name+' removed','danger');render();
}

function markPaid(bid, person, val){
  const b=STATE.bills.find(x=>x.id===bid);
  if(!b) return;
  b.paid[person]=val;
  toast(val ? person+' marked as paid ✓' : person+' marked unpaid', val?'ok':'warn');
  render();
}

function addBill(){
  const lbl=document.getElementById('bl'),amt=document.getElementById('ba');
  if(!lbl||!amt||!lbl.value.trim()||!amt.value)return;
  const total=parseFloat(amt.value);
  const names=['Reign','Angel'];
  const share=Math.round(total/names.length);
  const shares={},paid={};names.forEach(n=>{shares[n]=share;paid[n]=false;});
  STATE.bills.push({id:Date.now(),label:lbl.value.trim(),total,shares,paid});
  lbl.value='';amt.value='';toast('Bill split evenly!');render();
}

function avStyle(role){
  if(role==='leader')   return 'background:#0A7E8C;color:#d0f4f8';
  if(role==='landlord') return 'background:#7a4a00;color:#ffd980';
  return 'background:#0a3d55;color:#14A8BA';
}

function initials(name){return name.split(' ').map(n=>n[0]).join('');}

function render(){
  const u=STATE.user,tab=STATE.activeTab;
  const isLeader=u.role==='leader',isLandlord=u.role==='landlord';
  const sn=u.name.split(' ')[0];

  const rMeta={
    roommate:{pill:'tag-teal',   label:'Roommate'},
    leader:  {pill:'tag-purple', label:'Room leader'},
    landlord:{pill:'tag-coral',  label:'Landlord'},
  }[u.role];

  const myChores = isLeader ? STATE.chores : STATE.chores.filter(c=>c.assigned===u.name);
  const myDone = myChores.filter(c=>c.done).length;
  const myOwed=STATE.bills.reduce((s,b)=>s+(b.shares[sn]&&!b.paid[sn]?b.shares[sn]:0),0);

  const tabs=isLandlord?['overview','bills','roommates','rules']:['chores','bills','rules'];
  const tabBtns=tabs.map(t=>`<div class="tab${tab===t?' on':''}" onclick="setTab('${t}')">${t[0].toUpperCase()+t.slice(1)}</div>`).join('');

  let body='';

  /* ── CHORES ─────────────────────────────────────────────── */
  if(tab==='chores'){
    const list=(isLeader||isLandlord)?STATE.chores:myChores;
    body=`
    <div class="grid2">
      <div class="metric">
        <div class="metric-label">${isLeader?'All chores':'My chores'}</div>
        <div class="metric-val">${myChores.length}</div>
        <div class="metric-sub">${myDone} completed</div>
      </div>
      <div class="metric">
        <div class="metric-label">Completion</div>
        <div class="metric-val">${myChores.length?Math.round(myDone/myChores.length*100):0}%</div>
        <div class="prog-wrap"><div class="prog-fill" style="width:${myChores.length?Math.round(myDone/myChores.length*100):0}%;background:var(--teal)"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">Chore list</div>
          <div class="card-sub">${isLeader?'All roommates':'Your assigned tasks'}</div>
        </div>
        ${isLeader?`<span class="tag tag-teal">Leader view</span>`:''}
      </div>
      ${list.map(c=>`
        <div class="row${c.done?' row-done':''}">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="check-box${c.done?' checked':''}">
              ${c.done?`<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="2,5 4.2,7.5 8,2.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
            </div>
            <div>
              <div class="row-label">${c.task}</div>
              <div class="row-sub">${c.assigned||'Unassigned'} &middot; due ${c.due}</div>
            </div>
          </div>
          <button class="btn btn-sm ${c.done?'btn-ghost':'btn-teal'}" onclick="markChore(${c.id})">${c.done?'Undo':'Mark done'}</button>
        </div>`).join('')}
    </div>
    ${isLeader?`<div class="card">
      <div class="card-head"><div class="card-title">Assign new chore</div></div>
      <div class="input-row">
        <input id="nc" placeholder="Describe the chore..." />
        <select id="na">
          ${STATE.roommates.map(r=>`<option value="${r.name}">${r.name.split(' ')[0]}</option>`).join('')}
        </select>
        <button class="btn btn-purple" onclick="addChore()">Assign</button>
      </div>
    </div>`:''}`;
  }

  /* ── BILLS ──────────────────────────────────────────────── */
  if(tab==='bills'){
    body=`
    <div class="grid2">
      <div class="metric">
        <div class="metric-label">Amount owed</div>
        <div class="metric-val" style="color:#c2841a">₱${myOwed.toLocaleString()}</div>
        <div class="metric-sub">unpaid bills</div>
      </div>
      <div class="metric">
        <div class="metric-label">Active bills</div>
        <div class="metric-val">${STATE.bills.length}</div>
        <div class="metric-sub">shared expenses</div>
      </div>
    </div>
    ${STATE.bills.map(b=>{
      const myPaid=b.paid[sn];
      const paidC=Object.values(b.paid).filter(Boolean).length;
      const totalC=Object.keys(b.paid).length;
      const pct=Math.round(paidC/totalC*100);
      const hasSplit=b.paid.hasOwnProperty(sn);
      return`<div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">${b.label}</div>
            <div class="card-sub">₱${b.total.toLocaleString()} total &middot; ${paidC}/${totalC} paid</div>
          </div>
          ${hasSplit
            ?`<button class="btn ${myPaid?'btn-ghost':'btn-teal'}" onclick="payBill(${b.id})">${myPaid?'Paid ✓':'Pay ₱'+b.shares[sn]}</button>`
            :`<span class="tag tag-gray">Not in split</span>`}
        </div>
        <div class="prog-wrap" style="margin-bottom:10px">
          <div class="prog-fill" style="width:${pct}%;background:${pct===100?'var(--teal)':'var(--gold)'}"></div>
        </div>
        ${(isLeader||isLandlord)?`<div style="display:flex;gap:6px;flex-wrap:wrap">
          ${Object.entries(b.paid).map(([n,p])=>`<span class="tag ${p?'tag-green':'tag-amber'}">${n} ${p?'✓':'–'}</span>`).join('')}
        </div>`:''}
      </div>`;}).join('')}
    ${isLeader?`<div class="card">
      <div class="card-head"><div class="card-title">Add new bill</div></div>
      <div class="input-row">
        <input id="bl" placeholder="Bill name (e.g. Groceries)" />
        <input id="ba" type="number" placeholder="Total ₱" style="max-width:110px" />
        <button class="btn btn-purple" onclick="addBill()">Split 4 ways</button>
      </div>
    </div>`:''}`;
  }

  /* ── BILLS (landlord) ───────────────────────────────────── */
  if(tab==='bills' && isLandlord){
    const totalAmt   = STATE.bills.reduce((s,b)=>s+b.total,0);
    const collectedAmt = STATE.bills.reduce((s,b)=>{
      return s + Object.entries(b.paid).reduce((ss,[n,p])=>ss+(p?b.shares[n]||0:0),0);
    },0);
    const uncollectedAmt = totalAmt - collectedAmt;
    const totalPeople = STATE.bills.reduce((s,b)=>s+Object.keys(b.paid).length,0);
    const paidPeople  = STATE.bills.reduce((s,b)=>s+Object.values(b.paid).filter(Boolean).length,0);

    body=`
    <div class="summary-strip">
      <div class="summary-chip total-chip">
        <div class="sc-label">Total billed</div>
        <div class="sc-val">₱${totalAmt.toLocaleString()}</div>
        <div class="sc-sub">${STATE.bills.length} active bills</div>
      </div>
      <div class="summary-chip collected">
        <div class="sc-label">Collected</div>
        <div class="sc-val">₱${collectedAmt.toLocaleString()}</div>
        <div class="sc-sub">${paidPeople} of ${totalPeople} paid</div>
      </div>
      <div class="summary-chip uncollected">
        <div class="sc-label">Uncollected</div>
        <div class="sc-val">₱${uncollectedAmt.toLocaleString()}</div>
        <div class="sc-sub">${totalPeople-paidPeople} pending payments</div>
      </div>
    </div>

    ${STATE.bills.map(b=>{
      const paidEntries   = Object.entries(b.paid).filter(([,p])=>p);
      const unpaidEntries = Object.entries(b.paid).filter(([,p])=>!p);
      const collected     = paidEntries.reduce((s,[n])=>s+(b.shares[n]||0),0);
      const uncollected   = unpaidEntries.reduce((s,[n])=>s+(b.shares[n]||0),0);
      const pct = b.total>0 ? Math.round(collected/b.total*100) : 0;

      return`<div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">${b.label}</div>
            <div class="card-sub">₱${b.total.toLocaleString()} total &middot; ₱${b.shares[Object.keys(b.shares)[0]]||0} per person</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:${pct===100?'var(--teal)':'var(--gold-dark)'}">₱${collected.toLocaleString()} <span style="font-size:11px;font-weight:500;color:var(--text-muted)">collected</span></div>
          </div>
        </div>
        <div class="prog-wrap" style="margin-bottom:14px">
          <div class="prog-fill" style="width:${pct}%;background:${pct===100?'var(--teal)':'var(--gold)'}"></div>
        </div>

        ${paidEntries.length>0?`
        <div class="bill-section-head">
          <span class="bsh-label">Paid</span>
          <span class="bsh-count" style="background:var(--ok-bg);color:var(--ok-text)">${paidEntries.length} resident${paidEntries.length>1?'s':''}</span>
        </div>
        <table class="bcol-table" style="margin-bottom:10px">
          <thead><tr>
            <th>Resident</th>
            <th>Amount</th>
            <th>Status</th>
          </tr></thead>
          <tbody>
            ${paidEntries.map(([n])=>`<tr>
              <td><div style="display:flex;align-items:center;gap:8px">
                <div class="av" style="width:28px;height:28px;font-size:10px;${avStyle('roommate')}">${n[0]}</div>
                <span>${n}</span>
              </div></td>
              <td><span class="bcol-amount" style="color:var(--teal)">₱${(b.shares[n]||0).toLocaleString()}</span></td>
              <td><button class="bcol-toggle paid" onclick="markPaid(${b.id},'${n}',false)" title="Click to mark unpaid"><span></span></button></td>
            </tr>`).join('')}
          </tbody>
        </table>`:''}

        ${unpaidEntries.length>0?`
        <div class="bill-section-head">
          <span class="bsh-label">Not yet paid</span>
          <span class="bsh-count" style="background:var(--warn-bg);color:var(--warn-text)">${unpaidEntries.length} pending</span>
        </div>
        <table class="bcol-table">
          <thead><tr>
            <th>Resident</th>
            <th>Amount due</th>
            <th>Collect</th>
          </tr></thead>
          <tbody>
            ${unpaidEntries.map(([n])=>`<tr>
              <td><div style="display:flex;align-items:center;gap:8px">
                <div class="av" style="width:28px;height:28px;font-size:10px;${avStyle('roommate')}">${n[0]}</div>
                <span>${n}</span>
              </div></td>
              <td><span class="bcol-amount" style="color:var(--gold-dark)">₱${(b.shares[n]||0).toLocaleString()}</span></td>
              <td><button class="bcol-toggle unpaid" onclick="markPaid(${b.id},'${n}',true)" title="Click to mark as collected"><span></span></button></td>
            </tr>`).join('')}
          </tbody>
        </table>`:''}

        ${unpaidEntries.length===0?`<div style="text-align:center;padding:10px 0;font-size:13px;color:var(--teal);font-weight:600">All payments collected ✓</div>`:''}
      </div>`;
    }).join('')}

    <div class="card">
      <div class="card-head"><div class="card-title">Add new bill</div></div>
      <div class="input-row">
        <input id="bl" placeholder="Bill name (e.g. Groceries)" />
        <input id="ba" type="number" placeholder="Total ₱" style="max-width:110px" />
        <button class="btn btn-coral" onclick="addBill()">Split evenly</button>
      </div>
    </div>`;
  }

  /* ── RULES ──────────────────────────────────────────────── */
  if(tab==='rules'){
    const canAdd=isLeader||isLandlord;
    body=`
    <div class="sec-hd"><div class="sec-hd-txt">Dorm-wide</div><div class="sec-hd-line"></div></div>
    <div class="card">
      ${STATE.rules.filter(r=>r.level==='dorm').map(r=>`
        <div class="row">
          <div style="display:flex;align-items:flex-start;gap:10px">
            <div style="width:7px;height:7px;border-radius:50%;background:var(--gold);margin-top:5px;flex-shrink:0"></div>
            <div>
              <div class="row-label">${r.text}</div>
              <div class="row-sub">by ${r.author}</div>
            </div>
          </div>
          ${isLandlord?`<button class="btn btn-sm btn-red" onclick="deleteRule(${r.id})">Remove</button>`:''}
        </div>`).join('')}
    </div>
    <div class="sec-hd"><div class="sec-hd-txt">Room rules</div><div class="sec-hd-line"></div></div>
    <div class="card">
      ${STATE.rules.filter(r=>r.level==='room').map(r=>`
        <div class="row">
          <div style="display:flex;align-items:flex-start;gap:10px">
            <div style="width:7px;height:7px;border-radius:50%;background:var(--teal-light);margin-top:5px;flex-shrink:0"></div>
            <div>
              <div class="row-label">${r.text}</div>
              <div class="row-sub">by ${r.author}</div>
            </div>
          </div>
          ${(isLeader&&r.author===u.name)||isLandlord?`<button class="btn btn-sm btn-red" onclick="deleteRule(${r.id})">Remove</button>`:''}
        </div>`).join('')}
    </div>
    ${canAdd?`<div class="card">
      <div class="card-head"><div class="card-title">Post a rule</div></div>
      <div class="input-row">
        <input id="nr" placeholder="New rule..." />
        ${isLeader?`<select id="rl" style="max-width:130px">
          <option value="room">Room rule</option>
          <option value="dorm">Dorm-wide</option>
        </select>`:''}
        <button class="btn ${isLandlord?'btn-coral':'btn-purple'}" onclick="addRule()">Post</button>
      </div>
    </div>`:`<div style="font-size:13px;color:var(--text-secondary);padding:10px 0;text-align:center">Only the room leader or landlord can post rules.</div>`}`;
  }

  /* ── OVERVIEW (landlord) ────────────────────────────────── */
  if(tab==='overview'){
    const totalPaid=STATE.bills.reduce((s,b)=>s+Object.values(b.paid).filter(Boolean).length,0);
    const totalShares=STATE.bills.reduce((s,b)=>s+Object.keys(b.paid).length,0);
    const doneAll=STATE.chores.filter(c=>c.done).length;
    const rooms=[...new Set(STATE.roommates.map(r=>r.room))];
    const totalBilledAmt = STATE.bills.reduce((s,b)=>s+b.total,0);
    const collectedTotal = STATE.bills.reduce((s,b)=>s+Object.entries(b.paid).reduce((ss,[n,p])=>ss+(p?b.shares[n]||0:0),0),0);
    const uncollectedTotal = totalBilledAmt - collectedTotal;
    body=`
    <div class="grid4">
      <div class="metric"><div class="metric-label">Rooms</div><div class="metric-val">${rooms.length}</div></div>
      <div class="metric"><div class="metric-label">Residents</div><div class="metric-val">${STATE.roommates.length}</div></div>
      <div class="metric"><div class="metric-label">Chores done</div><div class="metric-val">${doneAll}/${STATE.chores.length}</div></div>
      <div class="metric"><div class="metric-label">Bills paid</div><div class="metric-val">${totalPaid}/${totalShares}</div></div>
    </div>
    <div class="summary-strip">
      <div class="summary-chip collected">
        <div class="sc-label">Total collected</div>
        <div class="sc-val">₱${collectedTotal.toLocaleString()}</div>
        <div class="sc-sub">${totalPaid} payments received</div>
      </div>
      <div class="summary-chip uncollected">
        <div class="sc-label">Still owed</div>
        <div class="sc-val">₱${uncollectedTotal.toLocaleString()}</div>
        <div class="sc-sub">${totalShares-totalPaid} payments pending</div>
      </div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title">Bills overview</div>
        <span class="tag tag-coral">Owner view</span>
      </div>
      ${STATE.bills.map(b=>{
        const p=Object.values(b.paid).filter(Boolean).length,t=Object.keys(b.paid).length;
        const pct=Math.round(p/t*100);
        return`<div class="row">
          <div>
            <div class="row-label">${b.label}</div>
            <div class="row-sub">₱${b.total.toLocaleString()} &middot; ${p}/${t} paid</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:${pct===100?'var(--teal)':'var(--gold-dark)'}">${pct}%</div>
            <div class="prog-wrap" style="width:72px">
              <div class="prog-fill" style="width:${pct}%;background:${pct===100?'var(--teal)':'var(--gold)'}"></div>
            </div>
          </div>
        </div>`;}).join('')}
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">Chore compliance</div></div>
      ${STATE.roommates.map(r=>{
        const mine=STATE.chores.filter(c=>c.assigned===r.name),done=mine.filter(c=>c.done).length;
        const pct=mine.length?Math.round(done/mine.length*100):0;
        return`<div class="row">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="av" style="${avStyle(r.role)}">${initials(r.name)}</div>
            <div>
              <div class="row-label">${r.name}</div>
              <div class="row-sub">Room ${r.room}</div>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:13px;font-weight:700;font-family:'DM Mono',monospace">${done}/${mine.length}</div>
            <div style="font-size:11px;color:${pct===100?'var(--teal)':'var(--text-secondary)'}">done</div>
          </div>
        </div>`;}).join('')}
    </div>`;
  }

  /* ── ROOMMATES (landlord) ───────────────────────────────── */
  if(tab==='roommates'){
    body=`
    <div class="card">
      <div class="card-head">
        <div class="card-title">All residents</div>
        <span class="tag tag-coral">Landlord view</span>
      </div>
      ${STATE.roommates.map(r=>`
        <div class="row">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="av" style="${avStyle(r.role)}">${initials(r.name)}</div>
            <div>
              <div class="row-label">${r.name}</div>
              <div class="row-sub">Room ${r.room} &middot; <span style="text-transform:capitalize">${r.role}</span></div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="tag ${r.role==='leader'?'tag-teal':r.role==='landlord'?'tag-coral':'tag-gray'}">${r.role}</span>
            <button class="btn btn-sm btn-red" onclick="removeRoommate('${r.name}')">Remove</button>
          </div>
        </div>`).join('')}
    </div>`;
  }

  document.getElementById('dashboard').innerHTML=`
    <div class="topbar">
      <div class="tb-left">
        <div class="tb-logo">Dorm<span>mate</span></div>
        <span class="tag ${rMeta.pill}">${rMeta.label}</span>
      </div>
      <div class="tb-right">
        <span class="tb-user">${u.name}</span>
        <button class="tb-logout" onclick="logout()">Sign out</button>
      </div>
    </div>
    <div class="main">
      <div id="_toast" class="toast ok" style="opacity:0"></div>
      <div class="nav-tabs">${tabBtns}</div>
      ${body}
    </div>`;
}
</script>
</body>
</html>
